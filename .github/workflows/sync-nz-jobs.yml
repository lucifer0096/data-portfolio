name: Sync and Verify NZ Jobs App

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  sync_data:
    name: Sync data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      sync_timestamp: ${{ steps.sync_meta.outputs.sync_timestamp }}
      changed_files: ${{ steps.sync_meta.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow xlsxwriter huggingface_hub

      - name: Run sync script
        run: python NZ-Jobs-Dashboard/scripts/sync_nz_jobs.py

      - name: Update build marker
        id: sync_meta
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import subprocess

          marker = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          path = Path("NZ-Jobs-Dashboard/app/build_info.py")
          path.write_text(f'LAST_SYNC = "{marker}"\n', encoding="utf-8")

          changed = subprocess.run(
              ["git", "status", "--short"],
              capture_output=True,
              text=True,
              check=True
          ).stdout.strip()

          changed_one_line = changed.replace("\n", " | ") if changed else "No staged changes yet"

          github_output = Path.cwd() / Path("${GITHUB_OUTPUT}")
          with open(github_output, "a", encoding="utf-8") as f:
              f.write(f"sync_timestamp={marker}\n")
              f.write(f"changed_files={changed_one_line}\n")
          PY

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NZ-Jobs-Dashboard/data/ NZ-Jobs-Dashboard/app/build_info.py
          git diff --staged --quiet || git commit -m "Automated NZ jobs sync"
          git push origin main

  check_app:
    name: Verify app uses refreshed data
    runs-on: ubuntu-latest
    needs: sync_data

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Pull latest commit from main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r NZ-Jobs-Dashboard/requirements.txt

      - name: Validate refreshed dataset
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("NZ-Jobs-Dashboard/data/gold/analyst_roles.parquet")
          df = pd.read_parquet(path)

          posted = pd.to_datetime(df["Date Posted"], errors="coerce") if "Date Posted" in df.columns else pd.Series(dtype="datetime64[ns]")

          rows = len(df)
          max_posted = posted.max() if not posted.empty else pd.NaT
          min_posted = posted.min() if not posted.empty else pd.NaT
          latest_day_rows = int((posted.dt.date == max_posted.date()).sum()) if pd.notna(max_posted) else 0

          file_mtime_utc = datetime.fromtimestamp(path.stat().st_mtime, tz=timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")

          summary_md = f"""# Sync verification summary

          - Sync timestamp: { "${{ needs.sync_data.outputs.sync_timestamp }}" }
          - Parquet path: `{path}`
          - Parquet file modified: {file_mtime_utc}
          - Total rows: {rows}
          - Earliest Date Posted: {min_posted}
          - Latest Date Posted: {max_posted}
          - Rows on latest posted day: {latest_day_rows}
          - Changed files before commit: { "${{ needs.sync_data.outputs.changed_files }}" }
          """

          with open("validation_summary.md", "w", encoding="utf-8") as f:
              f.write(summary_md)

          with open("validation_metrics.csv", "w", encoding="utf-8") as f:
              f.write("metric,value\n")
              f.write(f"sync_timestamp,{ '${{ needs.sync_data.outputs.sync_timestamp }}' }\n")
              f.write(f"parquet_file_modified,{file_mtime_utc}\n")
              f.write(f"total_rows,{rows}\n")
              f.write(f"earliest_date_posted,{min_posted}\n")
              f.write(f"latest_date_posted,{max_posted}\n")
              f.write(f"rows_on_latest_posted_day,{latest_day_rows}\n")
          PY

      - name: Compile app
        run: python -m py_compile NZ-Jobs-Dashboard/app/app.py

      - name: Start Streamlit app headlessly
        run: |
          timeout 30s streamlit run NZ-Jobs-Dashboard/app/app.py --server.headless true --server.port 8501 || code=$?
          if [ "${code:-0}" -ne 0 ] && [ "${code:-0}" -ne 124 ]; then
            exit $code
          fi

      - name: Add run summary
        run: |
          cat validation_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync-validation
          path: |
            validation_summary.md
            validation_metrics.csv
