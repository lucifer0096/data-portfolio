name: Sync NZ Jobs Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow xlsxwriter huggingface_hub

      - name: Run sync script
        run: python NZ-Jobs-Dashboard/scripts/sync_nz_jobs.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NZ-Jobs-Dashboard/data/
          git diff --staged --quiet || git commit -m "Automated data sync"
          git push
